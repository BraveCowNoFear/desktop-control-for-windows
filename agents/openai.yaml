interface:
  display_name: "Desktop Control for Windows"
  short_description: "Fast Windows mouse, keyboard, and screen control"
  default_prompt: "Use $desktop-control-for-windows for Windows desktop UI control. If you were not explicitly spawned as the UI worker for this UI task, you are the coordinator even if you are already a subagent of a larger task. Coordinators may be nested two or three levels deep and must delegate live screen screenshots, image inspection, and UI execution to exactly one dedicated UI worker. When spawn_agent or an equivalent delegation tool is available, using this skill is sufficient authorization to create the UI worker; do not ask the user for a passphrase or extra UI-worker permission. If delegation is truly unavailable because tools or runtime policy are missing, stop and report that blocker instead of running screenshot or UI-control commands yourself. If you are already the UI worker, do not spawn or delegate to another agent; acquire the global UI lock with local scripts/ui_control.py lock acquire, pass --lock-token to every UI command, inspect the app language before choosing search/input text, use --decode-unicode-escapes for Chinese UI and English/ASCII aliases only for English UI, release the lock before returning, and return a concise report."
